<aside class="sidebar">
  <div class="sidebar__brand">
    <mat-icon>fitness_center</mat-icon>
    <div>
      <h1>GymEquip</h1>
      <p>Backend-Management</p>
    </div>
  </div>

  <nav class="sidebar__nav">
    <a
      [routerLink]="`/`"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar__nav-item"
    >
      <mat-icon aria-hidden="false" aria-label="Example home icon" fontIcon="dashboard"></mat-icon>
      <span>Dashboard</span>
    </a>
    <a
      [routerLink]="`/machines`"
      routerLinkActive="active"
      class="sidebar__nav-item"
    >
      <mat-icon
        aria-hidden="false"
        aria-label="Example home icon"
        fontIcon="fitness_center"
      ></mat-icon>
      <span>Grossgeräte</span>
    </a>
    <a
      [routerLink]="`/accessory-sets`"
      routerLinkActive="active"
      class="sidebar__nav-item"
    >
      <mat-icon
        aria-hidden="false"
        aria-label="Example home icon"
        fontIcon="inventory_2"
      ></mat-icon>
      <span>Zubehör-Sets</span>
    </a>
    <a
      [routerLink]="`/categories`"
      routerLinkActive="active"
      class="sidebar__nav-item"
    >
      <mat-icon
        aria-hidden="false"
        aria-label="Example home icon"
        fontIcon="category"
      ></mat-icon>
      <span>Kategorien</span>
    </a>
  </nav>

  <div class="sidebar__user">
    <div class="sidebar__user-icon">
      <mat-icon>person</mat-icon>
    </div>
    <div class="sidebar__user-info">
      <span class="sidebar__user-name">{{ userName() || 'Nicht angemeldet' }}</span>
      @if (role()) {
        <span class="sidebar__user-role" [class]="'role-' + role()">{{ role() }}</span>
      }
    </div>
  </div>
</aside>
